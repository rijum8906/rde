[workspace]
members = ["services/brightness"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Rijum <rijum@example.com>"]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.52", features = [
    "rt-multi-thread",
    "macros",
    "time",
    "signal",
] }
zbus = "5.16"
